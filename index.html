<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="../assets/Aperture.png" type="image/x-icon">

    <!-- Tailwind & Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="../CSS/style.css">

</head>

<body class="container w-11/12 mx-auto ">
    <div class="w-130 mx-auto shadow-2xl rounded-lg ">
        <div class="space-y-4 p-7 mt-20 ">
            <img class="mx-auto" src="../assets/github-logo.png" alt="">
            <h1 class="font-semibold text-xl text-center">GitHub Issues Tracker</h1>
            <p class="text-neutral-500 text-center">Sign in to manage your issues</p>
             <div class="space-y-7">
                <label class="font-bold" for="">Username:</label><br>
             <input id="username-input" class="w-full text-xl rounded-md p-2" placeholder="Enter Your UserName" type="text"><br>
             <label class="font-bold" for="">Password:</label><br>
             <input id="password-input" class="w-full text-xl rounded-md p-2" placeholder="Enter Your Password" type="password"><br>
             <button id="signIn-btn" class="btn btn-primary w-full rounded-lg">Sign In</button>

             <div class="mx-auto space-y-2 text-green-600 text-center">
                <p>Defult Username: admin</p>
                <p>Defult Password: admin123</p>
             </div>

             </div>
        </div>

    </div>

    

   <script>
       const UserInput = document.getElementById('username-input')
       const PasswordInput = document.getElementById('password-input')

       document.getElementById('signIn-btn').addEventListener('click', function () {
           const UserName = UserInput.value;
           const UserPassword = PasswordInput.value;

           if (UserName.toLowerCase() === 'admin' && UserPassword.toLowerCase() === 'admin123') {
               alert('Login Successful')
               window.location.assign("./main.html")
           }
           else {
               alert('Invalid Username or Password');
           }
       })
   </script> 
</body>

</html>
